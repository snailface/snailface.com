<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta itemprop="name" content="Snailface">
    <meta itemprop="image" content="/logo.png">
    <title>snailface.com - welcome</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css?family=Montserrat&display=swap" rel="stylesheet" />
    <link href="/style.css?v=4" type="text/css" rel="stylesheet" />
    <link rel="shortcut icon" href="/snailface.ico" />
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <script src="/eye-interact.js?v=7" defer></script>
    <meta content="website" property="og:type" />
    <meta content="https://snailface.com/" property="og:url" />
    <meta content="/eye.jpg" property="og:image" />
    <meta property="og:title" content="snailface.com - welcome" />
    <meta property="og:description" content="welcome to snailface." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="snailface.com - welcome" />
    <meta name="twitter:description" content="snailface.com" />
    <meta name="twitter:image" content="https://snailface.com/logo.png" />
    <meta name="twitter:url" content="https://snailface.com/" />
</head>

<body>
  <div class="background-image" aria-hidden="true" tabindex="-1"></div>

    <img src="logo.svg" width="300" height="400" decoding="async" alt="snailface logo" />

    <main>
  <h1>
    <span> </span>
  </h1>
  <input type="checkbox" id="myInput">
  <label for="myInput" class="menu-toggle">
      <span class="bar top"></span>
      <span class="bar middle"></span>
      <span class="bar bottom"></span>
    </label>
  <aside>
    <div class="aside-section aside-left">
      <img src="home.svg" class="aside-art-left" alt="" aria-hidden="true" width="1382" height="1286" loading="lazy" decoding="async" />
      <div class="aside-content">
        <p class="aside-eyebrow">hey&nbsp;you.</p>
        <p> welcome to <strong>snailface</strong> - feel free to post a <strong>message</strong> after the <strong>beep</strong>... or play a <a href="/snailface-dash.html" class="inline-link">snail's pace race</a>.</p>
      </div>
    </div>
    <div class="aside-section aside-right">
      <ul class="aside-list">
        <li class="aside-anchor">a means of interaction</li>

        <form method="POST" action="/api/contact">
          <li class="form-item">
            <label class="aside-anchor">your name <br> <input type="text" name="name" class="form-input" placeholder="your name" required/></label>
          </li>
          <li class="form-item">
            <label class="aside-anchor">your email <br> <input type="email" name="email" class="form-input" placeholder="your email" required/></label>
          </li>
          <li class="form-item">
            <label class="aside-anchor">your message <br> <textarea name="message" class="form-textarea" placeholder="what do you want to say?" required></textarea></label>
          </li>
          <li class="form-item form-actions">
            <div class="cf-turnstile-wrap">
              <div class="cf-turnstile" data-sitekey="0x4AAAAAADtqrf0Ea07WfWBo" data-theme="light" data-size="flexible"></div>
            </div>
            <button type="submit" class="button">post</button>
          </li>
        </form>
      </ul>
      <img src="snail.svg" class="aside-mascot" alt="" aria-hidden="true" width="463" height="187" loading="lazy" decoding="async" />
    </div>
    <div class="footer">
      © <script>document.write(new Date().getFullYear())</script>.
    </div>
  </aside>
</main>
</body>
</html>
