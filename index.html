<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta itemprop="name" content="Snailface">
    <meta itemprop="image" content="/logo.png">
    <title>snailface.com - welcome</title>
    <meta name="description" content="An eye that watches you back, a trail map of food and sights from the road, and a few games. Welcome to snailface.">

    <!-- Montserrat is self-hosted (see the @font-face at the top of style.css),
         so there is no preconnect/stylesheet hop to Google's two origins.
         Preloading here starts the woff2 immediately instead of waiting for
         style.css to parse. crossorigin is required even though the font is
         same-origin: fonts are always fetched in CORS mode, and a preload
         whose mode doesn't match is simply downloaded a second time. -->
    <link rel="preload" href="/fonts/montserrat-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link href="/style.css?v=12" type="text/css" rel="stylesheet" />
    <link rel="shortcut icon" href="/snailface.ico" />
    <!-- Start the eye download immediately instead of waiting for
         eye-interact.js to run. crossorigin="anonymous" matches fetch()'s
         default mode:"cors" credentials:"same-origin" so the preloaded
         response is reused rather than downloaded twice. -->
    <link rel="preload" href="/eye.svg?v=18" as="fetch" crossorigin="anonymous" />
    <!-- The logo is the LCP element but sits in <body>, so it is otherwise
         discovered late and races the eye preload above. No crossorigin here:
         the <img> is same-origin and plain, and an unmatched CORS mode would
         cost a second download. Keep ?v=3 identical to the <img> src. -->
    <link rel="preload" as="image" href="/logo.svg?v=3" fetchpriority="high" />
    <!-- Turnstile is lazy-loaded by the inline script at the end of <body>:
         the contact form is invisible until the menu opens, so the widget
         script doesn't belong in the critical path. -->
    <script src="/eye-interact.js?v=18" defer></script>
    <meta content="website" property="og:type" />
    <meta content="https://snailface.com/" property="og:url" />
    <meta content="https://snailface.com/eye.jpg" property="og:image" />
    <meta property="og:title" content="snailface.com - welcome" />
    <meta property="og:description" content="welcome to snailface." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="snailface.com - welcome" />
    <meta name="twitter:description" content="snailface.com" />
    <meta name="twitter:image" content="https://snailface.com/logo.png" />
    <meta name="twitter:url" content="https://snailface.com/" />
</head>

<body>
  <div class="background-image" aria-hidden="true" tabindex="-1"></div>

    <img src="/logo.svg?v=3" width="300" height="400" fetchpriority="high" alt="snailface logo" />

    <main>
  <h1>
    <span> </span>
  </h1>
  <input type="checkbox" id="myInput">
  <label for="myInput" class="menu-toggle">
      <span class="bar top"></span>
      <span class="bar middle"></span>
      <span class="bar bottom"></span>
    </label>
  <aside>
    <div class="aside-section aside-left">
      <img src="home.svg?v=2" class="aside-art-left" alt="" aria-hidden="true" width="1382" height="1286" loading="lazy" decoding="async" />
      <div class="aside-content">
        <p> welcome to <strong>snailface</strong> - feel free to post a <strong>message</strong>... play the <a href="/pace-race.html" class="inline-link">pace race</a> or follow the <a href="/map.html" class="inline-link">trail map</a>.</p>
      </div>
    </div>
    <div class="aside-section aside-right">
      <ul class="aside-list">
        <li class="aside-anchor">a means of interaction</li>

        <form method="POST" action="/api/contact">
          <li class="form-item">
            <label class="aside-anchor">your name <br> <input type="text" name="name" class="form-input" placeholder="your name" required/></label>
          </li>
          <li class="form-item">
            <label class="aside-anchor">your email <br> <input type="email" name="email" class="form-input" placeholder="your email" required/></label>
          </li>
          <li class="form-item">
            <label class="aside-anchor">your message <br> <textarea name="message" class="form-textarea" placeholder="what do you want to say?" required></textarea></label>
          </li>
          <li class="form-item form-actions">
            <div class="cf-turnstile-wrap">
              <div class="cf-turnstile" data-sitekey="0x4AAAAAADtqrf0Ea07WfWBo" data-theme="light" data-size="flexible"></div>
            </div>
            <button type="submit" class="button">post</button>
          </li>
        </form>
      </ul>
      <!-- Wrapper carries the wiggle animation, the img carries the
           drop-shadow filter. With both on one element (the old setup)
           Safari re-runs the filter every animation frame; split apart,
           the filtered snail is rendered once and the wrapper's transform
           is composited on the GPU. Visual result is identical. -->
      <div class="aside-mascot">
        <img src="snail.svg?v=2" alt="" aria-hidden="true" width="463" height="187" loading="lazy" decoding="async" />
      </div>
    </div>
    <div class="footer">
      © <span id="footer-year">2026</span>.
    </div>
  </aside>
</main>
<script>
  // Footer year without document.write (which blocks the parser).
  document.getElementById("footer-year").textContent = new Date().getFullYear();

  // Lazy-load Cloudflare Turnstile the first time the menu is opened —
  // the contact form (and its widget) is invisible until then.
  (function () {
    var input = document.getElementById("myInput");
    var loaded = false;
    function loadTurnstile() {
      if (loaded) return;
      loaded = true;
      var s = document.createElement("script");
      s.src = "https://challenges.cloudflare.com/turnstile/v0/api.js";
      s.async = true;
      document.head.appendChild(s);
    }
    if (input) {
      input.addEventListener("change", loadTurnstile);
      if (input.checked) loadTurnstile();
    } else {
      loadTurnstile();
    }
  })();
</script>
</body>
</html>
