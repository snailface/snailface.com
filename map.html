<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>snailface.com - trail map</title>
  <meta name="description" content="The snailface trail map — pins of food, sights and sounds from the road, each one a little story." />
  <!-- Montserrat is self-hosted now, so there's no preconnect/stylesheet hop
       to Google's two origins. crossorigin is required even though the font is
       same-origin: fonts are always fetched in CORS mode, and a preload whose
       mode doesn't match is simply downloaded a second time. -->
  <link rel="preload" href="/fonts/montserrat-latin.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="shortcut icon" href="/snailface.ico" />
  <!-- Leaflet is vendored under /vendor/leaflet/ — an unpkg fetch put a
       DNS+TLS handshake on the map's critical path and made a third party's
       uptime our uptime (SRI guards integrity, not availability). Same-origin
       now, so no integrity/crossorigin; ?v busts the year-long immutable cache. -->
  <link rel="stylesheet" href="/vendor/leaflet/leaflet.css?v=1.9.4" />
  <style>
    /* This page has no link to style.css — it is a self-contained map, and
       style.css is ~15KB of index-page chrome (menu toggle, aside, form) that
       would be render-blocking dead weight here, with an h1 rule that would
       fight the styles below. So the @font-face is repeated inline instead of
       pulling the whole stylesheet in for one rule. Keep it in sync with the
       copy at the top of style.css; the unicode-range is Google's verbatim and
       is what stops other subsets from ever being requested. */
    @font-face {
      font-family: "Montserrat";
      font-style: normal;
      font-weight: 100 900; /* one variable file covers 400 and the real bold */
      font-display: swap;
      src: url("/fonts/montserrat-latin.woff2") format("woff2");
      unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      background: #f399b7;
      font-family: "Montserrat", sans-serif;
      color: #00545e;
      overflow: hidden;
    }

    /* The map fills the whole screen; the title, nav and copyright ride on
       top as overlays instead of taking their own strip above it. */
    #map {
      position: fixed;
      inset: 0;
      background: #00a8ad;
    }

    /* Overlay wrappers are click-through so the map stays draggable behind
       them; only their pills/links catch pointer events. */
    .overlay { position: fixed; z-index: 1000; pointer-events: none; }
    .overlay > * { pointer-events: auto; }

    /* Popups render above the header/footer overlays (z 1000) so a snail's
       detail card is never hidden behind the chrome, even on the far edges. */
    .leaflet-popup-pane { z-index: 1100; }

    .map-header {
      top: 12px;
      left: 12px;
      right: 12px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .map-header > a img { height: 46px; width: auto; display: block; }

    /* Apple-Maps-style search: just a bar; the options drop beneath on click. */
    .search-wrap { position: relative; flex: 1; max-width: 420px; }

    .search-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(203, 222, 95, .95);
      border: 3px solid #00545e;
      border-radius: 22px 26px 22px 26px / 24px 22px 26px 22px;
      padding: 9px 14px;
    }

    .search-bar .mag { font-size: 15px; line-height: 1; }

    #search-input {
      flex: 1;
      min-width: 0;
      background: transparent;
      border: 0;
      outline: none;
      font-family: "Montserrat", sans-serif;
      font-weight: bold;
      font-size: .95em;
      color: #00545e;
    }

    #search-input::placeholder { color: rgba(0, 84, 94, .55); }

    .search-panel {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      background: rgba(243, 153, 183, .97);
      border: 3px solid #00545e;
      border-radius: 16px 22px 16px 22px / 20px 16px 22px 16px;
      padding: 10px 12px 12px;
      max-height: 62vh;
      overflow-y: auto;
      /* Nothing may push the panel sideways — a result row that overflowed
         used to spawn a horizontal scrollbar and run its text out past the
         bubble's edge. The rows are made to fit instead (see .result-row). */
      overflow-x: hidden;
    }

    .search-panel.open { display: block; }

    .panel-label {
      font-size: .68em;
      font-weight: bold;
      letter-spacing: .06em;
      color: #00545e;
      opacity: .75;
      margin: 8px 0 5px;
    }

    .panel-label:first-child { margin-top: 0; }

    #search-results { display: flex; flex-direction: column; gap: 4px; }

    .result-row {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fdfdfd;
      border: 2px solid #00545e;
      border-radius: 10px 14px 10px 14px / 12px 10px 14px 10px;
      padding: 6px 9px;
      font-size: .8em;
      font-weight: bold;
      color: #00545e;
      cursor: pointer;
      text-align: left;
      font-family: "Montserrat", sans-serif;
      width: 100%;
    }

    .result-row:hover { background: #76ced9; }

    /* Both text spans truncate rather than overflow. Flex items default to
       min-width:auto, which refuses to shrink below their content — that is
       what let a long "place · date" run outside the panel on a narrow
       screen. min-width:0 lets them shrink; ellipsis shows where they were
       cut. The snail swatch is fixed-size and never shrinks. */
    .result-row > span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .result-row .tsnail { flex: none; }

    /* The title is the useful part, so it doesn't shrink at all (flex-shrink
       0) — the place/date absorbs the whole squeeze and ellipsizes. Shrink
       factors alone weren't enough: flex shrinks in proportion to base size,
       so a short title like "Kadeau" still lost characters while the long
       place string kept them. The 60% cap stops a very long title from
       crowding the place out completely. */
    .result-row > span:not(.rr-place) { flex: 0 0 auto; max-width: 60%; }
    .result-row .rr-place { font-weight: normal; opacity: .75; margin-left: auto; font-size: .9em; flex: 0 1 auto; }
    .no-results { font-size: .78em; font-weight: bold; color: #00545e; opacity: .7; padding: 2px 2px 4px; }

    .chip-row { display: flex; flex-wrap: wrap; gap: 6px; }

    .chip {
      font-family: "Montserrat", sans-serif;
      font-weight: bold;
      font-size: .72em;
      color: #00545e;
      background: #76ced9;
      border: 2px solid #00545e;
      border-radius: 10px 14px 10px 14px / 12px 10px 14px 10px;
      padding: 4px 8px;
      cursor: pointer;
    }

    /* Toggled-off chips fade out; their pins leave the map. */
    .chip.off { background: transparent; opacity: .5; }

    /* Country chips are radio-style: exactly one active (lime). */
    .cchip {
      font-family: "Montserrat", sans-serif;
      font-weight: bold;
      font-size: .72em;
      color: #00545e;
      background: transparent;
      border: 2px solid #00545e;
      border-radius: 10px 14px 10px 14px / 12px 10px 14px 10px;
      padding: 4px 8px;
      cursor: pointer;
      opacity: .6;
    }

    .cchip.active { background: #cbde5f; opacity: 1; }

    .panel-foot { margin-top: 10px; }
    .panel-foot a { color: #00545e; font-weight: bold; font-size: .78em; text-decoration-color: #76ced9; }

    /* Category is shown by tinting the snail emblem itself (no badge).
       food = the natural green snail; sights + sounds hue-rotate it toward
       other snailface tones. A tiny version rides in chips/results too. */
    .t-sights { filter: hue-rotate(80deg) saturate(1.25); }   /* teal snail */
    .t-sounds { filter: hue-rotate(235deg) saturate(1.4); }   /* pink snail */

    .tsnail {
      height: 15px;
      width: auto;
      vertical-align: middle;
      margin-right: 5px;
    }

    /* Nudge Leaflet's zoom control below the search bar. */
    .leaflet-top.leaflet-left { top: 70px; }

    /* True two-color basemap via SVG duotone (a plain CSS filter can only
       shift everything into one hue family): grayscale, a hard contrast
       stretch that separates CARTO's near-white land from its gray water,
       then a table mapping dark->snailface teal, light->snailface green. */
    .leaflet-tile { filter: url(#snailtone); }

    .snail-pin { background: none; border: none; }

    .snail-pin img {
      width: 100%;
      display: block;
      filter: drop-shadow(2px 3px 0 rgba(0, 84, 94, .5));
    }

    /* Tint on the pin snail, keeping its drop-shadow. */
    .snail-pin img.t-sights { filter: hue-rotate(80deg) saturate(1.25) drop-shadow(2px 3px 0 rgba(0, 84, 94, .5)); }
    .snail-pin img.t-sounds { filter: hue-rotate(235deg) saturate(1.4) drop-shadow(2px 3px 0 rgba(0, 84, 94, .5)); }

    .leaflet-popup-content-wrapper {
      background: #f399b7;
      border: 3px solid #00545e;
      border-radius: 18px 26px 20px 28px / 24px 18px 26px 20px;
      color: #00545e;
      font-family: "Montserrat", sans-serif;
    }

    .leaflet-popup-tip { background: #76ced9; border: 2px solid #00545e; }

    /* Leaflet's default close button hangs off the top-right corner, which
       lands outside the bubble's rounded/wobbly border. Pull it inside and
       give it a teal circle so it reads clearly on the pink card. */
    .leaflet-popup-close-button {
      top: 8px !important;
      right: 8px !important;
      width: 22px;
      height: 22px;
      padding: 0 !important;
      /* Centered with flex rather than line-height. box-sizing is border-box
         (see the * rule at the top), so this 22px circle has only an 18px
         content box — the old 20px line-height overflowed it and pushed the
         glyph below center. flex centering is independent of font metrics,
         and Leaflet 1.9 wraps the x in its own <span>, which centers cleanly. */
      display: flex !important;
      align-items: center;
      justify-content: center;
      font: bold 15px/1 "Montserrat", sans-serif !important;
      color: #00545e !important;
      background: #76ced9 !important;
      border: 2px solid #00545e;
      border-radius: 50%;
      text-align: center;
    }

    .leaflet-popup-close-button:hover { background: #cbde5f !important; color: #00545e !important; }

    /* Clear a strip above the photo so the close circle sits in its own
       band of pink instead of overlapping the image corner.

       This MUST be padding, not margin. Leaflet sizes the pink wrapper from
       the content element's offsetHeight, which includes padding but not
       margin — with margin-top the wrapper came out 36px short and the title
       and "read the whole trail" link spilled out past the bottom edge of
       the card. */
    .leaflet-popup-content { padding-top: 36px; margin-top: 0; }

    .post-popup { max-width: 220px; text-align: center; }

    /* Fixed height (not max-height) so the popup has a known, uniform size
       the instant it opens — before the photo finishes loading — which lets
       Leaflet's autoPan place the whole card in view without a late reflow. */
    .post-popup .popup-photo {
      width: 190px;
      height: 130px;
      object-fit: cover;
      image-orientation: from-image; /* honor camera EXIF rotation on future photos */
      display: block;
      border: 3px solid #00545e;
      border-radius: 12px;
      margin-bottom: 8px;
      background: #fdfdfd;
    }

    .post-popup .post-title {
      font-weight: bold;
      font-size: 1.15em;
      margin-bottom: 2px;
    }

    .post-popup .post-date {
      font-size: .75em;
      font-weight: bold;
      opacity: .7;
      margin-bottom: 8px;
    }

    .post-popup .read-more {
      display: inline-block;
      padding: 5px 12px;
      background: #76ced9;
      color: #00545e;
      border: 2px solid #00545e;
      border-radius: 12px 16px 12px 16px / 14px 12px 16px 12px;
      font-family: "Montserrat", sans-serif;
      font-weight: bold;
      font-size: .8em;
      text-decoration: none;
      cursor: pointer;
    }

    /* Brand copyright pill, overlaid bottom-left. */
    .map-foot { bottom: 12px; left: 12px; }

    .copyright {
      background: #cbde5f;
      color: #f399b7;
      border: 2px solid #00545e;
      padding: 5px 12px;
      border-radius: 12px 16px 12px 16px / 14px 12px 16px 12px;
      font-weight: bold;
      font-size: 1.05em;
    }

    /* Only appears when a post has no GPS; centered above the bottom edge. */
    #lost-snails {
      position: fixed;
      z-index: 1000;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      max-width: 80vw;
      text-align: center;
      font-size: .8em;
      font-weight: bold;
      color: #00545e;
      background: rgba(203, 222, 95, .92);
      border: 2px solid #00545e;
      border-radius: 10px;
      padding: 4px 10px;
      pointer-events: none;
    }

    #lost-snails:empty { display: none; }
    #lost-snails span { color: #d71920; }
  </style>
</head>

<body>
  <!-- Duotone filter used by .leaflet-tile: dark pixels -> teal #00a8ad,
       light pixels -> green #cbde5f. The linear transfer first stretches
       contrast so water (light gray on CARTO tiles) lands on the dark/teal
       side while land (near-white) stays on the light/green side. -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true" focusable="false">
    <filter id="snailtone" color-interpolation-filters="sRGB">
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncR type="linear" slope="6" intercept="-4.9" />
        <feFuncG type="linear" slope="6" intercept="-4.9" />
        <feFuncB type="linear" slope="6" intercept="-4.9" />
      </feComponentTransfer>
      <feComponentTransfer>
        <feFuncR type="table" tableValues="0 0.796" />
        <feFuncG type="table" tableValues="0.659 0.871" />
        <feFuncB type="table" tableValues="0.678 0.373" />
      </feComponentTransfer>
    </filter>
  </svg>

  <div id="map"></div>

  <div class="overlay map-header">
    <a href="/"><img src="logo.svg?v=3" alt="snailface logo" /></a>
    <div class="search-wrap">
      <div class="search-bar">
        <span class="mag" aria-hidden="true">🔍</span>
        <input id="search-input" type="text" placeholder="trail map" autocomplete="off" aria-label="search the trail map" />
      </div>
      <div class="search-panel" id="search-panel">
        <div id="search-results"></div>
        <div class="panel-label">where</div>
        <div class="chip-row" id="country-chips"></div>
        <div class="panel-label">what</div>
        <div class="chip-row">
          <button class="chip" data-type="food"><img class="tsnail t-food" src="/snail.svg?v=2" alt="" />food</button>
          <button class="chip" data-type="sights"><img class="tsnail t-sights" src="/snail.svg?v=2" alt="" />sights</button>
          <button class="chip" data-type="sounds"><img class="tsnail t-sounds" src="/snail.svg?v=2" alt="" />sounds</button>
        </div>
        <div class="panel-foot"><a href="/">&larr; back to the eye</a></div>
      </div>
    </div>
  </div>

  <div class="overlay map-foot">
    <span class="copyright">&copy; <span id="footer-year">2026</span>.</span>
  </div>

  <div id="lost-snails"></div>

  <script src="/vendor/leaflet/leaflet.js?v=1.9.4"></script>
  <script>
    (function () {
      "use strict";

      // Footer year without document.write (which blocks the parser).
      document.getElementById("footer-year").textContent = new Date().getFullYear();

      // One world on screen, but the globe still wraps: pan east past Alaska
      // and you carry on into Korea rather than hitting a wall.
      //
      // Those two rules don't conflict, because "never show the world twice"
      // is enforced entirely by minZoom (see clampMinZoom below). If the world
      // is always at least as wide as the viewport, two whole copies can never
      // fit on screen at once. Zoomed in past that floor you're seeing less
      // than one world, so crossing +/-180 just reveals the neighbouring copy
      // — that's the seam continuing, not the map duplicating. This is why
      // noWrap is deliberately NOT set on the tile layer.
      //
      // worldCopyJump moves the markers into whichever copy you've panned to,
      // so the pins are still there after you cross the antimeridian.
      //
      // maxBounds exists to stop vertical panning past the poles into empty
      // space — without it a single downward flick sends the map thousands of
      // pixels below the world and every pin leaves the screen.
      //
      // The longitude range is huge but deliberately FINITE. +/-Infinity is
      // the obvious way to say "don't clamp longitude", but Leaflet projects
      // maxBounds into pixel space to clamp the centre, and an infinite
      // longitude projects to an infinite x — the subtraction that follows
      // evaluates Infinity minus Infinity, i.e. NaN, and a NaN clamp seizes up
      // panning almost completely. A finite 100000 degrees is ~277 world
      // copies in each direction: endless in practice, and it still projects
      // to a real number.
      var PAN_BOUNDS = L.latLngBounds(
        L.latLng(-85, -100000),
        L.latLng(85, 100000)
      );

      var map = L.map("map", {
        worldCopyJump: true,
        maxBounds: PAN_BOUNDS,
        // 1.0 = a hard wall; anything less lets the map rubber-band past the
        // edge and spring back, which reads as a glitch rather than a limit.
        maxBoundsViscosity: 1
      }).setView([48, 8], 4);

      // CARTO's flat light basemap takes the duotone filter cleanly
      // (plain OSM tiles have too many competing colors to unify).
      L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
        maxZoom: 19,
        subdomains: "abcd",
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>'
      }).addTo(map);

      // The world is 256 * 2^zoom px square, so the smallest zoom that still
      // covers the viewport depends on the window size — hardcoding a minZoom
      // would either leave empty background on a large screen or over-zoom a
      // phone. Recompute on resize, and pull the camera back in if the
      // current zoom just became illegal.
      function clampMinZoom() {
        var size = map.getSize();
        var fit = Math.log(Math.max(size.x, size.y) / 256) / Math.LN2;
        var min = Math.max(0, Math.ceil(fit));
        map.setMinZoom(min);
        if (map.getZoom() < min) map.setZoom(min);
      }
      clampMinZoom();
      map.on("resize", clampMinZoom);

      // Category isn't a badge anymore — it's the color of the snail emblem
      // itself (a CSS tint class, natural green for food).
      var TYPES = ["food", "sights", "sounds"];

      function typeClass(type) {
        return TYPES.indexOf(type) !== -1 ? "t-" + type : "t-food";
      }

      // A small tinted snail for chips and search results.
      function snailSwatch(type) {
        return '<img class="tsnail ' + typeClass(type) + '" src="/snail.svg?v=2" alt="" />';
      }

      // snail.svg is 463x187 (~2.5:1); anchor at the snail's belly.
      function snailIcon(type) {
        return L.divIcon({
          className: "snail-pin",
          html: '<img class="' + typeClass(type) + '" src="/snail.svg?v=2" alt="" />',
          iconSize: [60, 24],
          iconAnchor: [30, 22],
          popupAnchor: [0, -22]
        });
      }

      // Minimal parser for the Jekyll front-matter subset these posts use:
      // scalar `key: value` lines and one-level `- item` lists. The body
      // below the closing --- is the description.
      function parsePost(text) {
        var m = text.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);
        if (!m) return null;
        var fm = {};
        var listKey = null;
        m[1].split(/\r?\n/).forEach(function (line) {
          var item = line.match(/^\s+-\s+(.+)$/);
          if (item && listKey) { fm[listKey].push(item[1].trim()); return; }
          var kv = line.match(/^(\w+):\s*(.*)$/);
          if (!kv) return;
          if (kv[2] === "") { listKey = kv[1]; fm[listKey] = []; }
          else { listKey = null; fm[kv[1]] = kv[2].trim(); }
        });
        fm.body = m[2].trim();                          // full text, paragraphs kept
        fm.description = fm.body.replace(/\s+/g, " ");   // one-line, for the popup
        return fm;
      }

      function esc(s) {
        var d = document.createElement("div");
        d.textContent = s || "";
        return d.innerHTML;
      }

      // Post date comes from the Jekyll filename convention
      // (/_posts/YYYY-MM-DD-slug.md): key sorts, label displays.
      var MONTHS = ["January", "February", "March", "April", "May", "June",
        "July", "August", "September", "October", "November", "December"];

      function dateOf(path) {
        var m = path.match(/(\d{4})-(\d{2})-(\d{2})/);
        if (!m) return { key: "", label: "" };
        return { key: m[1] + m[2] + m[3], label: MONTHS[parseInt(m[2], 10) - 1] + " " + m[1] };
      }

      // Photos ship with downscaled derivatives beside the original:
      // /map-photos/foo.jpg -> /map-photos/foo-480.jpg. The popup renders the
      // photo in a 190x130 CSS px box, so 480px is ample even at 2x DPR.
      // Anything that isn't a /map-photos/*.jpg is returned untouched.
      function sizedPhoto(src, width) {
        return /^\/map-photos\/[^?#]+\.jpe?g$/i.test(src)
          ? src.replace(/\.jpe?g$/i, "-" + width + ".jpg")
          : src;
      }

      // If a derivative is missing (e.g. a new post added without re-running
      // the resize step), fall back to the original instead of a broken image.
      // Missing derivative -> retry the original; original also missing ->
      // hide the img so the popup shows text-only instead of a broken-image
      // glyph (the state a brand-new post is in until its photo lands).
      var PHOTO_FALLBACK = ' onerror="this.onerror=function(){this.style.display=\'none\';};this.src=this.getAttribute(\'data-full\');"';

      // The map preview stays minimal: one photo, the name + date, and a
      // link to the full write-up. Everything else lives on the page.
      function popupHtml(post, path) {
        var photo = (post.photos || [])[0];
        // Production links use the clean /trail/<slug> URLs (served by
        // functions/trail/[slug].js — real per-post meta, and internal links
        // are how search engines discover them). Local dev has no Functions
        // runtime, so localhost keeps linking the ?p= fallback, which renders
        // identically client-side.
        var slugMatch = path.match(/^\/_posts\/\d{4}-\d{2}-\d{2}-(.+)\.md$/);
        var href = (slugMatch && location.hostname === "snailface.com")
          ? "/trail/" + slugMatch[1]
          : "/post.html?p=" + encodeURIComponent(path);
        var when = dateOf(path).label;
        return '<div class="post-popup">' +
          (photo ? '<img class="popup-photo" src="' + esc(sizedPhoto(photo, 480)) +
            '" data-full="' + esc(photo) + '" alt="" loading="lazy"' + PHOTO_FALLBACK + ' />' : '') +
          '<div class="post-title">' + esc(post.title) + '</div>' +
          (when ? '<div class="post-date">' + esc(when) + '</div>' : '') +
          '<a class="read-more" href="' + esc(href) + '">read the whole trail &rarr;</a>' +
          '</div>';
      }

      // Pin location comes straight from the post's `coords: lat, lon` line
      // (extracted from the photo EXIF once, by hand, rather than re-read
      // from every JPEG on every page load).
      function locatePost(post) {
        var parts = String(post.coords || "").split(",");
        if (parts.length !== 2) return null;
        var lat = parseFloat(parts[0]);
        var lon = parseFloat(parts[1]);
        return (isFinite(lat) && isFinite(lon)) ? [lat, lon] : null;
      }

      var lost = [];
      var entries = []; // { marker, coords, country, type } for filtering

      // Country = last comma-separated segment of the post's `place:` line
      // (e.g. "Nordhavn, Copenhagen, Denmark" -> "Denmark").
      function countryOf(post) {
        var parts = (post.place || "").split(",");
        return parts.length ? parts[parts.length - 1].trim() : "";
      }

      // Search normalisation, so "quebec" finds "Québec" and vice versa.
      //
      // NFD splits an accented letter into its base plus a separate combining
      // mark, which the regex then strips: é -> e, è -> e, ä -> a, ç -> c.
      //
      // That handles most of it, but not every accented letter is a base plus
      // a mark. æ and ø are letters in their own right in Danish and Norwegian
      // and survive NFD untouched, so they need spelling out by hand — which
      // matters here, since it's what lets "jordnaer" match "Jordnær".
      var FOLD_PAIRS = [[/æ/g, "ae"], [/ø/g, "o"], [/å/g, "a"], [/ß/g, "ss"], [/đ|ð/g, "d"], [/ł/g, "l"], [/þ/g, "th"]];

      function fold(s) {
        s = String(s || "").toLowerCase();
        for (var i = 0; i < FOLD_PAIRS.length; i++) s = s.replace(FOLD_PAIRS[i][0], FOLD_PAIRS[i][1]);
        return s.normalize ? s.normalize("NFD").replace(/[\u0300-\u036f]/g, "") : s;
      }

      var searchInput = document.getElementById("search-input");
      var searchPanel = document.getElementById("search-panel");
      var resultsBox = document.getElementById("search-results");
      var countryChips = document.getElementById("country-chips");
      var chips = document.querySelectorAll(".chip");
      var selectedCountry = ""; // "" = everywhere

      // Filters combine: a pin shows when its category chip is on AND it
      // matches the selected country ("everywhere" = all). The view refits
      // to whatever survives so a country pick jumps you straight there.
      function applyFilters() {
        var typesOn = {};
        chips.forEach(function (c) {
          typesOn[c.getAttribute("data-type")] = !c.classList.contains("off");
        });
        var visible = [];
        entries.forEach(function (e) {
          var show = typesOn[e.type] !== false && (!selectedCountry || e.country === selectedCountry);
          if (show) {
            if (!map.hasLayer(e.marker)) e.marker.addTo(map);
            visible.push(e.coords);
          } else if (map.hasLayer(e.marker)) {
            map.closePopup();
            map.removeLayer(e.marker);
          }
        });
        if (visible.length) {
          map.fitBounds(L.latLngBounds(visible).pad(0.25), { maxZoom: 8 });
        }
      }

      chips.forEach(function (c) {
        c.addEventListener("click", function () {
          c.classList.toggle("off");
          applyFilters();
        });
      });

      // Typing in the bar live-searches post titles/places/descriptions,
      // newest post first; picking a result flies to that pin (clearing
      // any filter hiding it).
      function renderResults() {
        var q = fold(searchInput.value.trim());
        resultsBox.innerHTML = "";
        if (!q) return;
        var hits = entries.filter(function (e) {
          return fold(e.title + " " + e.place + " " + e.desc).indexOf(q) !== -1;
        }).sort(function (a, b) {
          return b.dateKey < a.dateKey ? -1 : (b.dateKey > a.dateKey ? 1 : 0);
        }).slice(0, 6);
        if (!hits.length) {
          resultsBox.innerHTML = '<div class="no-results">no snails found for “' + esc(q) + '”</div>';
          return;
        }
        hits.forEach(function (e) {
          var row = document.createElement("button");
          row.className = "result-row";
          row.innerHTML = snailSwatch(e.type) +
            '<span>' + esc(e.title) + '</span>' +
            '<span class="rr-place">' + esc(e.place) +
            (e.dateLabel ? ' &middot; ' + esc(e.dateLabel) : '') + '</span>';
          row.addEventListener("click", function () {
            // Make sure nothing is filtering this pin out of view.
            if (selectedCountry && selectedCountry !== e.country) setCountry("");
            chips.forEach(function (c) {
              if (c.getAttribute("data-type") === e.type) c.classList.remove("off");
            });
            applyFilters();
            closePanel();
            map.setView(e.coords, 10);
            e.marker.openPopup();
          });
          resultsBox.appendChild(row);
        });
      }

      function setCountry(country) {
        selectedCountry = country;
        countryChips.querySelectorAll(".cchip").forEach(function (c) {
          c.classList.toggle("active", c.getAttribute("data-country") === country);
        });
      }

      function openPanel() { searchPanel.classList.add("open"); }
      function closePanel() { searchPanel.classList.remove("open"); }

      searchInput.addEventListener("focus", openPanel);
      searchInput.addEventListener("input", function () { openPanel(); renderResults(); });
      searchInput.addEventListener("keydown", function (e) {
        if (e.key === "Escape") { searchInput.blur(); closePanel(); }
        if (e.key === "Enter") {
          var first = resultsBox.querySelector(".result-row");
          if (first) first.click();
        }
      });

      // Click anywhere outside the search closes the options.
      document.addEventListener("pointerdown", function (e) {
        if (!e.target.closest || !e.target.closest(".search-wrap")) closePanel();
      });

      // posts.json is the manifest of Jekyll posts to pin. Only the manifest
      // is fetched with no-cache, so a newly added visit shows up right away;
      // the .md files themselves ride the normal HTTP cache (see _headers,
      // which gives /_posts/* a short max-age).
      fetch("/map-photos/posts.json", { cache: "no-cache" })
        .then(function (res) { return res.json(); })
        .then(function (posts) {
          return Promise.all(posts.map(function (path) {
        return fetch(path)
          .then(function (res) {
            if (!res.ok) throw new Error(path + ": " + res.status);
            return res.text();
          })
          .then(function (text) {
            var post = parsePost(text);
            if (!post || !post.photos || !post.photos.length) { lost.push(path); return; }
            var coords = locatePost(post);
            if (!coords) { lost.push(post.title || path); return; }
            var marker = L.marker(coords, { icon: snailIcon(post.type || "food") })
              .addTo(map)
              // autoPan padding keeps the popup clear of the header overlay
              // (top) and the copyright/attribution (bottom), so a snail's
              // detail card is never hidden behind the chrome or cut off.
              .bindPopup(popupHtml(post, path), {
                maxWidth: 240,
                // Cap height to the viewport (minus the header/footer
                // clearance) so a tall card scrolls inside the popup
                // instead of spilling off-screen on short/landscape windows.
                maxHeight: Math.max(150, window.innerHeight - 150),
                keepInView: true,
                autoPanPaddingTopLeft: L.point(20, 100),
                autoPanPaddingBottomRight: L.point(20, 56)
              });
            var when = dateOf(path);
            entries.push({
              marker: marker,
              coords: coords,
              country: countryOf(post),
              type: (post.type || "food").toLowerCase(),
              title: post.title || "",
              place: post.place || "",
              desc: post.description || "",
              dateKey: when.key,
              dateLabel: when.label
            });
          })
          .catch(function () { lost.push(path); });
          }));
        })
        .then(function () {
        // Build the country chips from the loaded posts (sorted, unique).
        var countries = {};
        entries.forEach(function (e) { if (e.country) countries[e.country] = true; });
        ["", ].concat(Object.keys(countries).sort()).forEach(function (c) {
          var chip = document.createElement("button");
          chip.className = "cchip" + (c === "" ? " active" : "");
          chip.setAttribute("data-country", c);
          chip.textContent = c === "" ? "everywhere" : c;
          chip.addEventListener("click", function () {
            setCountry(c);
            applyFilters();
          });
          countryChips.appendChild(chip);
        });
        applyFilters();
        if (lost.length) {
          document.getElementById("lost-snails").innerHTML =
            "<span>lost snails</span> (no coordinates found): " + lost.map(esc).join(", ");
        }
      });
    })();
  </script>
</body>

</html>
